<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facilitator Dashboard</title>
<link rel="stylesheet" href="./shared.css">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f8f9fa;
    --surface2: #e9ecef;
    --border: #dee2e6;
    --text: #212529;
    --text-muted: #6c757d;
    --accent: #0d6efd;
    --accent-hover: #0b5ed7;
    --green: #198754;
    --yellow: #ffc107;
    --red: #dc3545;
    --orange: #fd7e14;
    --user-bg: #e7f1ff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1d21;
      --surface: #212529;
      --surface2: #2b3035;
      --border: #495057;
      --text: #e9ecef;
      --text-muted: #adb5bd;
      --accent: #6ea8fe;
      --accent-hover: #3d8bfd;
      --green: #75b798;
      --yellow: #ffda6a;
      --red: #ea868f;
      --orange: #feb272;
      --user-bg: #1a3152;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header h1 { font-size: 1.125rem; font-weight: 600; }

  .header-actions { display: flex; gap: 0.5rem; align-items: center; }

  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 1px;
    background: var(--border);
    min-height: calc(100vh - 49px);
  }

  .panel {
    background: var(--bg);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.8125rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 1;
  }

  .panel-body { padding: 0.75rem; flex: 1; }

  /* ─── Session/Participant List ─── */
  .session-selector {
    padding: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .session-selector select {
    width: 100%;
    padding: 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.375rem;
    color: var(--text);
    font-size: 0.8125rem;
  }

  .participant-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.625rem 0.75rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .participant-card:hover, .participant-card.active {
    border-color: var(--accent);
  }

  .participant-card .name { font-weight: 500; font-size: 0.875rem; }
  .participant-card .meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.125rem; }

  .status-dot {
    display: inline-block;
    width: 0.5rem;
    height: 0.5rem;
    border-radius: 50%;
    margin-right: 0.25rem;
  }

  .status-dot.joined { background: var(--yellow); }
  .status-dot.interviewing { background: var(--accent); animation: pulse 2s infinite; }
  .status-dot.stale { background: var(--text-muted); }
  .status-dot.completed { background: var(--green); }

  .participant-card.dimmed {
    opacity: 0.45;
  }

  .participant-card.dimmed:hover {
    opacity: 0.7;
  }

  .threshold-flag {
    color: var(--orange);
    font-size: 0.8125rem;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ─── Transcript ─── */
  .transcript-msg {
    padding: 0.375rem 0.625rem;
    margin-bottom: 0.375rem;
    border-radius: 0.375rem;
    font-size: 0.8125rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .transcript-msg.user {
    background: var(--user-bg);
    margin-left: 1rem;
  }

  .transcript-msg.assistant {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-right: 1rem;
  }

  .transcript-msg .role-label {
    font-size: 0.625rem;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.125rem;
  }

  /* ─── Buttons ─── */
  .btn {
    padding: 0.5rem 1rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 0.375rem;
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
  }

  .btn-outline:hover { background: var(--accent); color: white; }

  /* ─── Analysis Memo ─── */
  .analysis-memo {
    font-size: 0.8125rem;
    line-height: 1.7;
    color: var(--text);
  }

  .analysis-memo h3 {
    font-size: 0.9375rem;
    font-weight: 600;
    margin-top: 1.25rem;
    margin-bottom: 0.375rem;
    color: var(--accent);
  }

  .analysis-memo h4 {
    font-size: 0.8125rem;
    font-weight: 600;
    margin-top: 1rem;
    margin-bottom: 0.25rem;
  }

  .analysis-memo p {
    margin-bottom: 0.5rem;
  }

  .analysis-memo em {
    color: var(--text-muted);
  }

  /* ─── Synthesis Streaming ─── */
  .synthesis-stream {
    font-size: 0.8125rem;
  }

  .streaming-label {
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 0.5rem;
  }

  .synthesis-raw {
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: inherit;
    font-size: 0.8125rem;
    line-height: 1.6;
    color: var(--text);
    margin: 0;
  }

  .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: cursor-blink 0.8s step-end infinite;
  }

  @keyframes cursor-blink {
    50% { opacity: 0; }
  }

  .synthesis-card {
    border-left: 3px solid var(--accent);
  }

  .copy-toolbar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .btn-sm {
    padding: 0.25rem 0.625rem;
    font-size: 0.75rem;
  }

  /* ─── Synthesis ─── */
  .synthesis-section {
    margin-bottom: 1.5rem;
  }

  .synthesis-section h3 {
    font-size: 0.875rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }

  .conflict-axis {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.75rem;
    margin-bottom: 0.5rem;
  }

  .conflict-axis .axis-label {
    text-align: center;
    font-weight: 600;
    font-size: 0.875rem;
    margin-bottom: 0.5rem;
    color: var(--orange);
  }

  .conflict-positions {
    display: flex;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .conflict-positions .pos {
    flex: 1;
    font-size: 0.75rem;
    padding: 0.375rem;
    background: var(--surface2);
    border-radius: 0.25rem;
  }

  .conflict-positions .pos .arch { font-weight: 600; color: var(--accent); }

  .requirement-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.625rem 0.75rem;
    margin-bottom: 0.5rem;
  }

  .requirement-card .req-text { font-weight: 500; font-size: 0.8125rem; }
  .requirement-card .req-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

  .narrative {
    font-size: 0.875rem;
    line-height: 1.6;
    white-space: pre-wrap;
    color: var(--text);
  }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .tab {
    padding: 0.5rem 1rem;
    font-size: 0.8125rem;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .share-url {
    padding: 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.375rem;
    margin-bottom: 0.75rem;
    font-size: 0.75rem;
    word-break: break-all;
    color: var(--accent);
    cursor: pointer;
  }

  .share-url:hover { background: var(--surface2); }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 2rem 1rem;
    font-size: 0.875rem;
  }

  /* ─── Create Session Form ─── */
  .create-session-form {
    max-width: 800px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .form-field {
    margin-bottom: 1.25rem;
  }

  .form-field label {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-weight: 600;
    font-size: 0.875rem;
    margin-bottom: 0.375rem;
  }

  .form-field input[type="text"],
  .form-field textarea {
    width: 100%;
    padding: 0.5rem 0.625rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.375rem;
    color: var(--text);
    font-size: 0.8125rem;
    font-family: inherit;
    resize: vertical;
  }

  .form-field textarea {
    font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
    font-size: 0.75rem;
    line-height: 1.5;
  }

  .form-field input:focus,
  .form-field textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.15);
  }

  .field-help {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.375rem;
    line-height: 1.4;
  }

  .default-ref {
    display: inline-flex;
    gap: 0.375rem;
    font-weight: 400;
  }

  .btn-link {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 0.75rem;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }

  .btn-link:hover {
    color: var(--accent-hover);
  }

  @media (max-width: 800px) {
    .header {
      padding: 0.75rem 1rem;
      align-items: flex-start;
      flex-direction: column;
      gap: 0.75rem;
    }

    .header-actions {
      width: 100%;
      flex-wrap: wrap;
    }

    .header-actions .btn,
    .header-actions select {
      flex: 1 1 100%;
      width: 100%;
    }

    .layout {
      grid-template-columns: 1fr;
      min-height: auto;
    }

    .panel {
      min-height: 0;
    }

    .panel-body {
      padding: 0.75rem;
    }

    .tabs {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab {
      white-space: nowrap;
      flex-shrink: 0;
    }

    .conflict-positions {
      flex-direction: column;
    }

    .create-session-form {
      padding: 1rem;
    }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="./dashboard.tsx"></script>
</body>
</html>
